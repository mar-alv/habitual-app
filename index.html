<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rastreador de Hábitos</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>

  <body>
    <div class="topbar">
      <div>
        <h1>Hábitos ✨</h1>
        <div class="subtitle">
          Organize sua rotina de um jeito bonito e leve.
        </div>
      </div>

      <div
        class="topbar-actions"
        style="flex-wrap: wrap; justify-content: flex-end"
      >
        <button class="primary-btn" onclick="openCreateModal()">
          <i class="ph ph-plus-circle"></i>
          Novo hábito
        </button>

        <input
          type="file"
          id="csv-input"
          accept=".csv"
          class="hidden"
          onchange="importHabits(event)"
        />

        <button class="ghost-btn" onclick="downloadExampleCsv()">
          <i class="ph ph-file-csv"></i>
          CSV exemplo
        </button>

        <button class="ghost-btn" onclick="exportHabits()">
          <i class="ph ph-download-simple"></i>
          Exportar
        </button>

        <button class="ghost-btn" onclick="$('#csv-input').click()">
          <i class="ph ph-upload-simple"></i>
          Importar
        </button>

        <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
          <i class="ph ph-moon-stars"></i>
        </button>
      </div>
    </div>

    <div class="filters">
      <input
        id="search"
        placeholder="Pesquisar hábitos..."
        oninput="loadHabits()"
      />

      <input
        id="tags-filter"
        placeholder="Filtrar por tags"
        oninput="loadHabits()"
      />
    </div>

    <div class="section-title">
      <h2>Hábitos</h2>
    </div>

    <ul id="habits"></ul>

    <div id="metrics-wrapper" class="hidden">
      <div class="section-title">
        <h2>Métricas</h2>
      </div>

      <div id="metrics"></div>
    </div>

    <div class="modal" id="habit-modal">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h3 id="modal-title">Novo hábito</h3>
            <div class="subtitle">Preencha as informações do hábito.</div>
          </div>

          <button class="icon-btn" onclick="closeModal()">
            <i class="ph ph-x"></i>
          </button>
        </div>

        <input id="name" placeholder="Nome do hábito" />

        <div style="height: 12px"></div>

        <textarea id="description" placeholder="Descrição"></textarea>

        <div style="height: 12px"></div>

        <input id="tags" placeholder="Tags separadas por vírgula" />

        <div style="height: 12px"></div>

        <select id="frequency">
          <option value="daily">Diário</option>
          <option value="weekly">Semanal</option>
        </select>

        <div class="modal-actions">
          <button class="ghost-btn" onclick="closeModal()">Cancelar</button>

          <button class="primary-btn" onclick="submitHabit()">
            <i class="ph ph-floppy-disk"></i>
            Salvar
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="script.js"></script>
  </body>
</html>
